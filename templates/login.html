<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Agenda Médica</title>
</head>

<body>

    <h1>Agenda Médica</h1>

    <h2>Login</h2>

    <!-- A MENSAGEM DE ERRO FICA AQUI -->
    {% if erro %}
        <p style="color:red">
            {{ erro }}
        </p>
    {% endif %}

    <!-- O FORMULÁRIO COMEÇA AQUI -->
    <form method="POST">

        <label>Usuário</label><br>

        <input
            type="text"
            name="usuario"
            required>

        <br><br>

        <label>Senha</label><br>

        <input
            type="password"
            name="senha"
            required>

        <br><br>

        <button type="submit">
            Entrar
        </button>

    </form>

</body>
</html>
