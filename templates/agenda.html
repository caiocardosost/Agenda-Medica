<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <title>Agenda Médica</title>

    <!-- CSS do Tabulator -->
    <link
        href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator.min.css"
        rel="stylesheet">

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            margin:40px;
        }

        input{
            width:350px;
            padding:8px;
            margin-top:10px;
            margin-bottom:20px;
        }

    </style>

</head>

<body>

    <h1>Agenda Médica</h1>

    <h3>Agendamentos</h3>

    <input
        type="text"
        id="busca"
        placeholder="Buscar por paciente, CPF ou médico">

    <div id="agenda"></div>


    <!-- Biblioteca Tabulator -->
    <script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>

    <script>

        //----------------------------------------------------
        // Dados enviados pelo Flask
        //----------------------------------------------------

        const dados = {{ agendamentos | tojson }};

        //----------------------------------------------------
        // Criação da tabela
        //----------------------------------------------------

        const tabela = new Tabulator("#agenda", {

            data: dados,

            layout: "fitColumns",

            placeholder: "Nenhum agendamento disponível.",

            columns: [

                {
                    title:"Data",
                    field:"data"
                },

                {
                    title:"Horário",
                    field:"horario"
                },

                {
                    title:"Paciente",
                    field:"paciente"
                },

                {
                    title:"CPF",
                    field:"cpf"
                },

                {
                    title:"Médico",
                    field:"medico"
                },

                {
                    title:"Especialidade",
                    field:"especialidade"
                },

                {
                    title:"Convênio",
                    field:"convenio"
                },

                {
                    title:"Status",
                    field:"status"
                }

            ]

        });

        //----------------------------------------------------
        // Campo de busca
        //----------------------------------------------------

        document
            .getElementById("busca")
            .addEventListener("keyup", function(){

                const texto = this.value
                    .trim()
                    .toLowerCase();

                if(texto === ""){

                    tabela.clearFilter();

                    return;

                }

                tabela.setFilter(function(data){

                    return (

                        data.paciente.toLowerCase().includes(texto)

                        ||

                        data.cpf.includes(texto)

                        ||

                        data.medico.toLowerCase().includes(texto)

                    );

                });

            });

    </script>

</body>

</html>
