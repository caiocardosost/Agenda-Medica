<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <title>Agenda Médica</title>

    <!-- CSS do Tabulator -->
    <link
        href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator.min.css"
        rel="stylesheet">

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            margin:40px;
        }

        input{
            width:350px;
            padding:8px;
        }

        button{
            padding:8px 12px;
        }

        form{
            margin-bottom:20px;
        }

    </style>

</head>

<body>

    <h1>Agenda Médica</h1>

    <!--
        O formulário utiliza GET.
        Quando o usuário clicar em "Buscar", o navegador fará uma
        requisição para:

        /agenda?busca=valor_digitado

        O Flask receberá esse parâmetro através de
        request.args.get("busca")
    -->

    <form method="GET" action="/agenda">

        <input
            type="text"
            name="busca"
            placeholder="Pesquisar por paciente, CPF ou médico"
            value="{{ busca }}">

        <button type="submit">
            Buscar
        </button>

    </form>

    <div id="agenda"></div>

    <!-- JavaScript do Tabulator -->
    <script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>

    <script>

        /*
            O Flask envia a lista "agendamentos" para o template.

            O filtro "tojson" converte a lista Python em um objeto
            JavaScript.
        */

        const dados = {{ agendamentos | tojson }};

        /*
            Cria a tabela.
        */

        new Tabulator("#agenda", {

            data: dados,

            layout: "fitColumns",

            placeholder: "Nenhum agendamento encontrado.",

            columns: [

                {
                    title:"Data",
                    field:"data"
                },

                {
                    title:"Horário",
                    field:"horario"
                },

                {
                    title:"Paciente",
                    field:"paciente"
                },

                {
                    title:"CPF",
                    field:"cpf"
                },

                {
                    title:"Médico",
                    field:"medico"
                },

                {
                    title:"Especialidade",
                    field:"especialidade"
                },

                {
                    title:"Convênio",
                    field:"convenio"
                },

                {
                    title:"Status",
                    field:"status"
                }

            ]

        });

    </script>

</body>

</html>
